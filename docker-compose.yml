version: '3.9'

services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - poker_data:/app/data
    environment:
      - PORT=3001
      - DATABASE_URL=file:/app/data/prod.db
      - PUBLIC_URL=http://localhost:3001
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  poker_data:
